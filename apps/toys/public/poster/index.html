<body class="wa-effect poster-app">

<header class="wa-top">
  <div class="theme-switcher-container">
    <button class="theme-switcher-pill" aria-label="Cycle theme" title="Cycle theme">
      <span class="theme-switcher-pill-icon">●</span>
    </button>
  </div>
  <nav class="kami-breadcrumb"><a href="https://apps.iamkesava.com">home</a><span class="sep">&middot;</span><a href="https://toys.iamkesava.com/">toys</a></nav>
  <div class="grow"></div>
  <div class="wa-actions">
    <button id="edit-toggle" class="wa-action-btn" title="Edit copy per poster" aria-pressed="false">edit</button>
    <button id="panel-toggle" class="wa-action-btn" title="Toggle control panel" aria-pressed="true">control</button>
    <button id="help-btn" title="Keyboard shortcuts">?</button>
  </div>
</header>

<main class="wa-stage poster-stage">
  <section class="masthead">
    <div class="masthead-rule"></div>
    <div class="masthead-lede">
      <h1 class="masthead-title">A typophile's autonomous studio.</h1>
      <p class="masthead-sub">Type a phrase. Two art directors compose. Every decision shown. Every decision editable.</p>
    </div>
    <div class="masthead-rule"></div>
  </section>

  <section class="input-strip">
    <textarea id="phrase" rows="2" spellcheck="false">less is more</textarea>
    <div class="input-cta">
      <button id="go" title="⌘/Ctrl + Enter">Compose</button>
      <label class="tb" for="img-upload" style="text-align:center;cursor:pointer;justify-content:center;font-size:12px;">image substrate ↑</label>
      <input id="img-upload" type="file" accept="image/*" style="display:none">
    </div>
  </section>
  <div id="status">seed: ready</div>

  <div class="diptych">
    <article class="poster-card">
      <div class="edit-strip" data-key="a">
        <label class="edit-lbl">copy · A</label>
        <textarea class="edit-copy" id="edit-a" rows="2" spellcheck="false"></textarea>
        <button class="edit-revert" data-key="a" title="Revert to seed">↺</button>
      </div>
      <canvas id="poster-a" width="1080" height="1350"></canvas>
      <div class="card-foot">
        <span style="font-family:var(--kami-font-mono);font-size:11px;color:var(--text);opacity:.55">poster · A</span>
        <button class="dl" id="dl-a">PNG</button>
      </div>
      <div class="trace" id="trace-a"></div>
    </article>
    <article class="poster-card">
      <div class="edit-strip" data-key="b">
        <label class="edit-lbl">copy · B</label>
        <textarea class="edit-copy" id="edit-b" rows="2" spellcheck="false"></textarea>
        <button class="edit-revert" data-key="b" title="Revert to seed">↺</button>
      </div>
      <canvas id="poster-b" width="1080" height="1350"></canvas>
      <div class="card-foot">
        <span style="font-family:var(--kami-font-mono);font-size:11px;color:var(--text);opacity:.55">poster · B</span>
        <button class="dl" id="dl-b">PNG</button>
      </div>
      <div class="trace" id="trace-b"></div>
    </article>
  </div>
</main>
